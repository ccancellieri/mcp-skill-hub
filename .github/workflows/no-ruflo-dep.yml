name: no-ruflo-dep

# Enforces the hard constraint documented in docs/comparison-ruflo.md:
# skill-hub never runtime-depends on ruflo (claude-flow). The only place
# ruflo names are allowed is inside one-shot importer scripts under
# scripts/import_ruflo_*.py, which read a ruflo install from disk and
# never load it as a Python module.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  grep-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: pyproject.toml must not depend on claude-flow or ruflo
        run: |
          if grep -Eqi 'claude-flow|ruflo' pyproject.toml; then
            echo "::error file=pyproject.toml::pyproject.toml must not reference claude-flow or ruflo"
            grep -Eni 'claude-flow|ruflo' pyproject.toml || true
            exit 1
          fi

      - name: src/ must not import claude_flow
        run: |
          if grep -rE 'import claude_flow|from claude_flow' src/; then
            echo "::error::src/ must not import claude_flow"
            exit 1
          fi
