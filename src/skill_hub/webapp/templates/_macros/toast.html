{# Plugin extension-point: A11 — shared toast/alert macro.
   `kind` ∈ {info, good, warn, bad}. #}
{% macro toast(message, kind='info', dismissible=true) -%}
<div class="toast toast-{{ kind }}" role="status">
  <span class="toast-msg">{{ message }}</span>
  {% if dismissible %}
    <button type="button" class="toast-close"
            onclick="this.parentElement.remove()" aria-label="Dismiss">&times;</button>
  {% endif %}
</div>
{%- endmacro %}
