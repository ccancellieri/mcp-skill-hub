<tr id="teach-{{ t.id }}">
  <td>#{{ t.id }}</td>
  <td title="{{ t.rule }}">{{ t.rule[:100] }}{% if t.rule|length > 100 %}…{% endif %}</td>
  <td><span class="tag">{{ t.action }}</span></td>
  <td class="muted">{{ t.target_type }}{% if t.target_id %}:{{ t.target_id }}{% endif %}</td>
  <td>
    <form hx-patch="/teachings/{{ t.id }}/weight"
          hx-target="#teach-{{ t.id }}" hx-swap="outerHTML"
          style="display:inline">
      <input type="number" name="weight" value="{{ '%.2f'|format(t.weight or 1.0) }}"
             step="0.1" style="width:70px" onchange="this.form.requestSubmit()">
    </form>
  </td>
  <td>
    <button class="btn sm danger"
            hx-post="/teachings/{{ t.id }}/delete"
            hx-target="#teach-{{ t.id }}" hx-swap="outerHTML"
            hx-confirm="Delete teaching #{{ t.id }}?">×</button>
  </td>
</tr>
