<div class="teach-item action-{{ t.action }}" id="teach-{{ t.id }}">
  <div>
    <div class="teach-rule">{{ t.rule }}</div>
    <div class="teach-meta">
      <span class="teach-id">#{{ t.id }}</span>
      <span class="teach-action-badge {{ t.action }}">{{ t.action }}</span>
      {% if t.target_type %}<span class="teach-target">{{ t.target_type }}{% if t.target_id %}:{{ t.target_id }}{% endif %}</span>{% endif %}
    </div>
  </div>
  <div class="teach-actions">
    <form hx-patch="/teachings/{{ t.id }}/weight"
          hx-target="#teach-{{ t.id }}" hx-swap="outerHTML"
          style="display:contents">
      <input class="teach-weight-input" type="number" name="weight"
             value="{{ '%.2f'|format(t.weight or 1.0) }}"
             step="0.1" title="weight"
             onchange="this.form.requestSubmit()">
    </form>
    <button class="btn sm danger"
            hx-post="/teachings/{{ t.id }}/delete"
            hx-target="#teach-{{ t.id }}" hx-swap="outerHTML"
            hx-confirm="Delete teaching #{{ t.id }}?">×</button>
  </div>
</div>
