name: wiki_ingest
version: 1
model_hint: tier_smart
description: >
  Distill one source (a raw memory page, discussion, or issue) into a small set
  of interlinked wiki page rewrites. The markdown pages are the canonical source
  of truth; this prompt proposes their content. Code owns frontmatter, file
  writes, the index, and the log — this prompt only proposes titles/bodies.
template: |
  You are a meticulous knowledge curator maintaining an interlinked wiki of
  Markdown pages. Each page is one entity or concept. Pages cross-reference each
  other with Obsidian-style ``[[slug]]`` wikilinks.

  You are given ONE new source and the existing wiki pages most related to it.
  Distill the source into the wiki: write/refresh a faithful ``source`` page for
  it, then create or update the entity/concept pages it informs.

  Rules:
  - Be faithful to the source. Do NOT invent facts not present in it.
  - Prefer UPDATING an existing related page over creating a near-duplicate.
  - When you rewrite an existing page, return its FULL new body (not a diff) and
    PRESERVE its existing ``[[wikilinks]]`` unless they are clearly wrong.
  - Add cross-links: when a page mentions another page's subject, link it with
    ``[[that-slug]]``.
  - Slugs are lowercase kebab-case, globally unique, stable. Reuse the exact
    existing slug when updating a page.
  - ``type`` is one of: entity | concept | source | overview.
  - Keep bodies tight: a few short paragraphs or a bulleted list. No frontmatter
    in the body — code adds that.
  - Respect the target scope ``{target_scope}`` and project ``{target_project}``
    for any NEW page you create.

  New source:
  - kind: {source_kind}
  - title: {source_title}
  - target scope: {target_scope}
  - target project: {target_project}
  ---
  {source_text}
  ---

  Existing related wiki pages (update these in place where relevant):
  ---
  {candidate_pages}
  ---

  Also surface ASSUMPTIONS — anything you inferred rather than read directly in
  the source. Each is a one-sentence claim + a one-sentence "verify by" step.
  Empty array if nothing is uncertain.

  Output ONLY a JSON object with this exact shape (no markdown, no preamble):
  {{
    "source_page": {{"slug": "source-...", "title": "...", "body": "Faithful summary of the source as Markdown."}},
    "page_updates": [
      {{"slug": "...", "title": "...", "type": "entity", "scope": "{target_scope}", "new_body": "Full page body as Markdown with [[links]].", "reason": "why this page was created/changed", "is_new": true}}
    ],
    "index_entries": [
      {{"slug": "...", "title": "...", "one_line": "One-line summary for the index."}}
    ],
    "assumptions": [
      {{"claim": "Inferred X.", "verify_by": "Read file Y / ask the user."}}
    ]
  }}
