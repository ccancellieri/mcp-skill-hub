{% from "_macros/kpi.html" import kpi_card %}
<section class="dash-card dash-card--knowledge-bridge">
  <header class="dash-card-head">
    <h3>Knowledge Bridge</h3>
    <a class="dash-card-link" href="/knowledge-bridge/">Open →</a>
  </header>
  <div class="kpi-row">
    {{ kpi_card("Projects", project_count|string, kind="default") }}
    {{ kpi_card("Entities", entity_count|string, kind="default") }}
    {{ kpi_card("Last sync", last_sync_at or "never", kind=("good" if last_sync_at else "warn")) }}
  </div>
</section>
